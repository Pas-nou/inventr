<!-- * Edit profile modal -->
@if (showEditModal) {
  <div
    class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm px-4 pb-8"
    (click)="closeEditModal()"
    aria-hidden="true"
  >
    <dialog
      open
      class="w-full bg-surface border border-border rounded-2xl p-6 flex flex-col gap-4"
      (click)="$event.stopPropagation()"
      aria-labelledby="edit-profile-modal-title"
    >
      <hgroup>
        <p id="edit-profile-modal-title" class="text-lg font-bold text-text-primary">
          Modifier mon profil
        </p>
      </hgroup>

      <!-- Firstname -->
      <div>
        <label class="text-xs uppercase tracking-widest text-text-secondary mb-2 block"
          >PRÉNOM</label
        >
        <input
          type="text"
          [(ngModel)]="editFirstName"
          class="w-full bg-surface-light border border-border rounded-xl px-4 py-3 text-text-primary focus:outline-none focus:border-primary transition-colors"
        />
      </div>

      <!-- Lastname -->
      <div>
        <label class="text-xs uppercase tracking-widest text-text-secondary mb-2 block">NOM</label>
        <input
          type="text"
          [(ngModel)]="editLastName"
          class="w-full bg-surface-light border border-border rounded-xl px-4 py-3 text-text-primary focus:outline-none focus:border-primary transition-colors"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="text-xs uppercase tracking-widest text-text-secondary mb-2 block"
          >EMAIL</label
        >
        <input
          type="email"
          [(ngModel)]="editEmail"
          class="w-full bg-surface-light border border-border rounded-xl px-4 py-3 text-text-primary focus:outline-none focus:border-primary transition-colors"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="text-xs uppercase tracking-widest text-text-secondary mb-2 block">
          MOT DE PASSE
          <span
            class="text-xs normal-case tracking-normal border border-border rounded-full px-2 py-0.5 ml-1"
            >OPTIONNEL</span
          >
        </label>
        <input
          type="password"
          [(ngModel)]="editPassword"
          placeholder="Laisser vide pour ne pas changer"
          class="w-full bg-surface-light border border-border rounded-xl px-4 py-3 text-text-primary focus:outline-none focus:border-primary transition-colors"
        />
      </div>

      <button
        (click)="confirmEditProfile()"
        [disabled]="!editFirstName || !editLastName || !editEmail || isSubmitting"
        class="w-full bg-primary text-background font-semibold rounded-2xl py-4 transition-opacity disabled:opacity-50"
      >
        @if (isSubmitting) {
          <span class="flex items-center justify-center gap-1">
            <span class="h-2 w-2 rounded-full bg-background dot-1"></span>
            <span class="h-2 w-2 rounded-full bg-background dot-2"></span>
            <span class="h-2 w-2 rounded-full bg-background dot-3"></span>
          </span>
        } @else {
          Enregistrer
        }
      </button>
      <button
        (click)="closeEditModal()"
        class="w-full text-text-secondary font-semibold rounded-2xl py-4 border border-border transition-colors"
      >
        Annuler
      </button>
    </dialog>
  </div>
}

<main class="min-h-screen bg-background text-text-primary pb-24 px-4 pt-6">
  <header class="mb-6">
    <h1 class="text-3xl font-bold font-display">Mon profil</h1>
  </header>

  <!-- User card -->
  <section
    aria-label="Informations utilisateur"
    class="bg-surface border border-border rounded-2xl p-4 flex items-center gap-4 mb-6"
  >
    <span
      class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-xl font-bold text-background shrink-0"
      aria-hidden="true"
    >
      {{ initials }}
    </span>
    <hgroup>
      <p class="font-semibold text-text-primary">{{ firstName }} {{ lastName }}</p>
      <p class="text-sm text-text-secondary">{{ email }}</p>
    </hgroup>
  </section>

  <!-- Account settings -->
  <section aria-label="Paramètres du compte">
    <p class="text-xs uppercase tracking-widest text-text-secondary mb-3">Compte</p>
    <ul class="flex flex-col gap-2">
      <li>
        <button
          (click)="openEditModal()"
          class="w-full bg-surface border border-border rounded-2xl p-4 flex items-center gap-4 transition-colors hover:border-primary"
        >
          <span
            class="w-8 h-8 rounded-xl bg-surface-light flex items-center justify-center shrink-0"
            aria-hidden="true"
          >
            <lucide-angular [img]="pencil" [size]="16" class="text-text-secondary" />
          </span>
          <hgroup class="flex-1 text-left">
            <p class="text-sm font-semibold text-text-primary">Modifier mon profil</p>
            <p class="text-xs text-text-secondary">Nom, email, mot de passe</p>
          </hgroup>
          <lucide-angular [img]="chevronRight" [size]="16" class="text-text-secondary shrink-0" />
        </button>
      </li>
      <li>
        <button
          class="w-full bg-surface border border-border rounded-2xl p-4 flex items-center gap-4 transition-colors hover:border-primary"
        >
          <span
            class="w-8 h-8 rounded-xl bg-surface-light flex items-center justify-center shrink-0"
            aria-hidden="true"
          >
            <lucide-angular [img]="bell" [size]="16" class="text-text-secondary" />
          </span>
          <hgroup class="flex-1 text-left">
            <p class="text-sm font-semibold text-text-primary">Notifications</p>
            <p class="text-xs text-text-secondary">Alertes garanties, maintenance</p>
          </hgroup>
          <lucide-angular [img]="chevronRight" [size]="16" class="text-text-secondary shrink-0" />
        </button>
      </li>
    </ul>
  </section>

  <!-- Logout -->
  <section aria-label="Déconnexion" class="mt-auto pt-8">
    <button
      (click)="logout()"
      class="w-full bg-surface border border-border rounded-2xl p-4 flex items-center gap-4 transition-colors hover:border-error"
    >
      <span
        class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0"
        style="background: rgba(239, 68, 68, 0.12)"
        aria-hidden="true"
      >
        <lucide-angular [img]="logOut" [size]="16" class="text-error-dim" />
      </span>
      <p class="text-sm font-semibold text-error-dim">Se déconnecter</p>
    </button>
  </section>
</main>
